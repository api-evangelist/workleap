apis:
  - aid: workleap:workleap-api
    name: Workleap API
    description: >
      The Workleap REST API provides programmatic access to user and group
      management, provisioning workflows, engagement scores, pulse survey
      feedback, GoodVibes recognition data, and organizational attributes across
      the Workleap platform. It supports both one-time management actions and
      recurring HRIS-synced provisioning via JSON or CSV-based connections.
    humanURL: https://docs.api.workleap.com/docs/getting-started
