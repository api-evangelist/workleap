aid: workleap
name: Workleap
description: >
  Workleap is an employee experience platform (formerly GSoft/Officevibe) that
  provides a suite of products covering engagement surveys, performance
  management, recognition, onboarding, and learning management. The Workleap
  REST API allows developers and HR teams to automate user provisioning, group
  management, and organization-wide sync operations with their HRIS. The API
  also exposes engagement scores, pulse survey results, feedback data, GoodVibes
  recognition items, and team sentiment analytics collected by the Officevibe
  product. Authentication uses an API key passed via the
  workleap-subscription-key header, and API access is available on the Pro and
  Enterprise subscription plans.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
